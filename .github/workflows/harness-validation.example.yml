# Example only. Copy or adapt this file to a real CI workflow when the target project needs it.
name: Harness Validation Example

on:
  pull_request:
  workflow_dispatch:

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shell syntax
        run: |
          bash -n scripts/start-workflow.sh
          bash -n scripts/validate-harness.sh
          bash -n scripts/status-workflow.sh
          bash -n tests/workflow-edge-cases.sh
      - name: Harness validation
        run: |
          scripts/validate-harness.sh
          scripts/validate-harness.sh --strict
          tests/workflow-edge-cases.sh
